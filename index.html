<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Database | Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <h1>CUSTOMER DATABASE</h1>
    </header>

    <main class="container">
        <div class="terminal-window">
            <div class="terminal-header">
                <div class="window-controls">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </div>
                <div class="window-title">bash — database-session</div>
            </div>

            <div class="terminal-body">
                <div class="terminal-line">
                    <span class="user-path">user@greens:~$</span>
                    <span class="command">init --database</span>
                </div>
                <div class="terminal-response">
                    System: Connection stable. Ready for query...
                </div>
                
                <button class="fetch-btn">
                    FETCH DATA _
                </button>
            </div>
        </div>
    </main>

</body>
</html>
